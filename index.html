<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e14">
<title>DeepSeek Balance</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='192' height='192'><rect width='192' height='192' rx='40' fill='%230a0e14'/><text x='96' y='120' text-anchor='middle' font-size='90' fill='%235b8def'>💎</text></svg>">
<style>
:root {
    --bg: #0a0e14; --bg2: #0f131a; --surface: #141920;
    --surface2: #1a1f28; --surface3: #1f2530;
    --border: #252b36; --border2: #2d3540;
    --text: #e8edf4; --text2: #8895a7; --text3: #5c6778;
    --accent: #5b8def; --accent2: #7c5ce7; --accent-glow: rgba(91,141,239,0.15);
    --green: #34d399; --green-bg: rgba(52,211,153,0.1);
    --red: #f87171; --red-bg: rgba(248,113,113,0.1);
    --orange: #fbbf24; --orange-bg: rgba(251,191,36,0.1);
    --radius: 18px; --radius-sm: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: var(--bg); }
body {
    font-family: var(--font); background: linear-gradient(180deg, #0a0e14 0%, #0f131a 30%, #0d1117 100%);
    color: var(--text); min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
    overflow-x: hidden;
}

/* ── Header ──────────────────────────── */
.header {
    padding: 14px 18px; display: flex; align-items: center;
    justify-content: space-between; gap: 12px; flex-shrink: 0;
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,14,20,0.85); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(37,43,54,0.5);
}
.header-left { display: flex; align-items: center; gap: 10px; }
.logo {
    width: 38px; height: 38px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; box-shadow: 0 4px 12px rgba(91,141,239,0.25);
}
.header h1 { font-size: 19px; font-weight: 750; letter-spacing: -0.3px; }
.header-actions { display: flex; gap: 6px; }
.icon-btn {
    width: 38px; height: 38px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text2); font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease; position: relative;
}
.icon-btn:hover { background: var(--surface2); border-color: var(--border2); transform: scale(1.03); }
.icon-btn:active { transform: scale(0.94); background: var(--surface3); }
.icon-btn .badge {
    position: absolute; top: -4px; right: -4px;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--red); border: 2px solid var(--bg);
    animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
}

.main { flex: 1; padding: 0 16px 28px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* ── Cards ───────────────────────────── */
.card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    position: relative; overflow: hidden;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}
@media (hover: hover) {
    .card:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
}

/* ── Balance Card ────────────────────── */
.balance-card {
    background: linear-gradient(160deg, #141920 0%, #181e28 100%);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px 20px 20px; position: relative; overflow: hidden;
}
.balance-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), transparent 70%);
    border-radius: 3px 3px 0 0;
}
.balance-card::after {
    content: ''; position: absolute; top: -40%; right: -25%;
    width: 220px; height: 220px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);
    border-radius: 50%; pointer-events: none;
}
.balance-label {
    font-size: 12px; color: var(--text2); text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 6px; font-weight: 500;
    position: relative; z-index: 1;
}
.balance-row { display: flex; align-items: baseline; gap: 6px; position: relative; z-index: 1; }
.balance-amount {
    font-size: 50px; font-weight: 850; letter-spacing: -2px; line-height: 1;
    background: linear-gradient(135deg, #e8edf4 0%, #bcc8dc 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
}
.balance-currency { font-size: 18px; font-weight: 500; color: var(--text2); }
.balance-details { display: flex; gap: 10px; margin-top: 16px; position: relative; z-index: 1; }
.balance-detail-item {
    flex: 1; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05); border-radius: var(--radius-sm);
    padding: 12px 14px; transition: background 0.2s;
}
.balance-detail-item:hover { background: rgba(255,255,255,0.05); }
.detail-icon { font-size: 15px; margin-bottom: 4px; }
.detail-label { font-size: 10.5px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
.detail-value { font-size: 17px; font-weight: 700; margin-top: 2px; color: var(--text); }

/* ── Status Row ──────────────────────── */
.status-row { display: flex; gap: 10px; }
.status-card {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px; text-align: center;
    cursor: pointer; transition: all 0.2s ease;
}
.status-card:active { transform: scale(0.97); background: var(--surface2); }
.status-icon { font-size: 24px; margin-bottom: 2px; }
.status-value { font-size: 20px; font-weight: 750; transition: color 0.3s; }
.status-label { font-size: 10.5px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
.status-available { color: var(--green); }
.status-unavailable { color: var(--red); }

/* ── Timer ───────────────────────────── */
.timer-section {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; padding: 2px 0; color: var(--text3); font-size: 12.5px;
}
.timer-ring { position: relative; width: 30px; height: 30px; }
.timer-ring svg { transform: rotate(-90deg); }
.timer-ring .bg { fill: none; stroke: var(--surface2); stroke-width: 2.5; }
.timer-ring .progress {
    fill: none; stroke: url(#timerGradient); stroke-width: 2.5;
    stroke-linecap: round; transition: stroke-dashoffset 1s linear;
}
.timer-text { font-variant-numeric: tabular-nums; font-size: 13px; font-weight: 600; color: var(--text2); }

/* ── Peak Banner ─────────────────────── */
.peak-banner {
    border-radius: var(--radius-sm); padding: 12px 14px; font-size: 12.5px;
    display: flex; align-items: center; gap: 10px;
    animation: peakPulse 3s ease-in-out infinite;
    transition: all 0.3s ease;
}
.peak-banner.peak-on {
    background: linear-gradient(135deg, rgba(248,113,113,0.13), rgba(248,113,113,0.04));
    border: 1px solid rgba(248,113,113,0.3); color: #fca5a5;
}
.peak-banner.peak-off {
    background: linear-gradient(135deg, rgba(52,211,153,0.08), rgba(52,211,153,0.02));
    border: 1px solid rgba(52,211,153,0.2); color: #6ee7b7;
    animation: none;
}
.peak-banner.peak-soon {
    background: linear-gradient(135deg, rgba(251,191,36,0.12), rgba(251,191,36,0.03));
    border: 1px solid rgba(251,191,36,0.3); color: #fcd34d;
}
@keyframes peakPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; }
}
.peak-banner-icon { font-size: 20px; flex-shrink: 0; }
.peak-banner-body { flex: 1; min-width: 0; }
.peak-banner-title { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
.peak-banner-sub { font-size: 11px; opacity: 0.85; line-height: 1.4; }
.peak-banner-countdown { font-weight: 700; font-variant-numeric: tabular-nums; }
.peak-progress-bar {
    height: 3px; background: rgba(255,255,255,0.1);
    border-radius: 2px; margin-top: 6px; overflow: hidden;
}
.peak-progress-fill {
    height: 100%; border-radius: 2px; transition: width 60s linear;
}
.peak-on .peak-progress-fill { background: var(--red); }
.peak-soon .peak-progress-fill { background: var(--orange); }

/* ── Stats ───────────────────────────── */
.stats-divider {
    height: 1px; background: var(--border); margin: 6px 0;
    position: relative; text-align: center;
}
.stats-divider span {
    position: relative; top: -10px; background: var(--bg);
    padding: 0 14px; color: var(--text3); font-size: 11px;
    text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600;
}
.cost-summary { display: flex; gap: 8px; }
.cost-card {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 10px; text-align: center;
}
.cost-card .cost-amount {
    font-size: 20px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
}
.cost-card .cost-label { font-size: 10.5px; color: var(--text3); margin-top: 2px; line-height: 1.5; }
.cost-peak-tag {
    display: block; font-size: 9.5px; padding: 2px 0; font-weight: 600;
    color: var(--red);
}

.disclaimer-row {
    font-size: 10.5px; color: var(--text3); text-align: center;
    padding: 2px 8px; line-height: 1.6; opacity: 0.7;
}
.disclaimer-row a { color: var(--accent); text-decoration: none; }

/* ── Charts ──────────────────────────── */
.chart-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
}
.chart-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.chart-header-icon { font-size: 16px; }
.chart-header-title {
    font-size: 12.5px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.5px;
}
.chart-wrap { position: relative; width: 100%; height: 200px; }
.chart-wrap canvas { width: 100% !important; height: 100% !important; }

.time-toggles { display: flex; gap: 4px; margin-bottom: 12px; }
.time-toggle {
    padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2); font-size: 11px;
    cursor: pointer; transition: all 0.2s ease; font-weight: 500;
}
.time-toggle.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border-color: transparent; box-shadow: 0 2px 8px var(--accent-glow);
}
.time-toggle:active { transform: scale(0.95); }
.no-data-hint { text-align: center; color: var(--text3); font-size: 12px; padding: 20px 0; }

/* ── Settings ────────────────────────── */
.settings-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    padding: 20px;
}
.settings-overlay.open { opacity: 1; pointer-events: auto; }
.settings-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); width: 100%; max-width: 380px;
    padding: 24px 20px;
    transform: translateY(20px) scale(0.96);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.settings-overlay.open .settings-panel { transform: translateY(0) scale(1); }
.settings-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 18px; }
.settings-panel h3 { font-size: 17px; margin-bottom: 16px; font-weight: 700; }
.input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.input-group label { font-size: 12px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.input-row { display: flex; gap: 8px; }
.input-row input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-size: 14px; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    outline: none; transition: all 0.2s;
}
.input-row input:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
}
.btn {
    padding: 10px 18px; border-radius: 10px; font-size: 13px;
    font-weight: 650; cursor: pointer; border: none;
    transition: all 0.2s ease; white-space: nowrap;
}
.btn:active { transform: scale(0.96); }
.btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; box-shadow: 0 2px 8px var(--accent-glow);
}
.btn-primary:hover { box-shadow: 0 4px 16px rgba(91,141,239,0.3); }
.btn-danger { background: transparent; border: 1px solid rgba(248,113,113,0.3); color: var(--red); }
.btn-danger:hover { background: var(--red-bg); }
.btn-sm { padding: 6px 12px; font-size: 11px; border-radius: 8px; }

/* ── Empty State ─────────────────────── */
.empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding: 40px 24px; gap: 10px;
}
.empty-icon { font-size: 56px; margin-bottom: 8px; }
.empty-state h2 { font-size: 18px; font-weight: 700; }
.empty-state p { color: var(--text2); font-size: 13.5px; line-height: 1.6; max-width: 280px; }
.empty-state a { color: var(--accent); text-decoration: none; }

/* ── Error ───────────────────────────── */
.error-banner {
    background: var(--red-bg); border: 1px solid rgba(248,113,113,0.25);
    border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px;
    display: flex; flex-direction: column; align-items: flex-start; gap: 6px;
}
.error-banner .err-title { display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--red); }
.error-banner .err-body { font-size: 12px; line-height: 1.6; color: var(--text2); }

/* ── Loading ─────────────────────────── */
.loading-spinner {
    width: 36px; height: 36px; border: 3px solid var(--surface2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ───────────────────────────── */
.toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 22px; font-size: 13px;
    z-index: 200; transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5); pointer-events: none;
    font-weight: 500;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── Desktop ─────────────────────────── */
@media (min-width: 500px) {
    .main { max-width: 440px; margin: 0 auto; }
    .header { max-width: 440px; margin: 0 auto; width: 100%; padding: 14px 0; }
}
</style>
</head>
<body>

<header class="header">
    <div class="header-left">
        <div class="logo">💎</div>
        <h1>DeepSeek</h1>
    </div>
    <div class="header-actions">
        <button class="icon-btn" id="btnRefresh" title="刷新">🔄</button>
        <button class="icon-btn" id="btnSettings" title="设置">⚙️</button>
    </div>
</header>

<main class="main" id="mainContent"></main>

<!-- Timer gradient (referenced by SVG) -->
<svg width="0" height="0" style="position:absolute">
    <defs>
        <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#5b8def"/>
            <stop offset="100%" stop-color="#7c5ce7"/>
        </linearGradient>
    </defs>
</svg>

<div class="settings-overlay" id="settingsOverlay">
    <div class="settings-panel">
        <div class="settings-handle"></div>
        <h3>⚙️ 设置</h3>
        <div class="input-group">
            <label>DeepSeek API Key</label>
            <div class="input-row">
                <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx" autocomplete="off">
                <button class="btn btn-primary" id="btnSaveKey">保存</button>
            </div>
        </div>
        <button class="btn btn-danger" id="btnClearKey" style="width:100%;">🗑 清除 API Key</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
(function() {
var API_URLS = [
    '/api/balance',
    'https://api.deepseek.com/user/balance'
];
var REFRESH_INTERVAL = 30;
var STORAGE_KEY = 'deepseek_api_key';
var HISTORY_KEY = 'deepseek_balance_history';
var LAST_CKPT_KEY = 'deepseek_last_checkpoint_ts';
var CHECKPOINT_MINUTES = 5;
var MAX_HISTORY_DAYS = 90;

var $main = document.getElementById('mainContent');
var $overlay = document.getElementById('settingsOverlay');
var $apiKeyInput = document.getElementById('apiKeyInput');
var $toast = document.getElementById('toast');
var $btnRefresh = document.getElementById('btnRefresh');

var apiKey = localStorage.getItem(STORAGE_KEY) || '';
var countdown = REFRESH_INTERVAL;
var timerInterval = null;
var data = null;
var loading = false;

var chartTrend = null;
var chartHourly = null;
var chartDaily = null;
var chartMonthly = null;
var trendRange = '24h';

// ── Peak Hour Constants ──────────────────
// Source: DeepSeek official announcement June 2026
// Peak pricing effective mid-July 2026
// Two daily blocks: 09:00-12:00 and 14:00-18:00 (UTC+8)
var PEAK_BLOCKS = [
    { name: 'morning', startMin: 540, endMin: 720,  label: '早高峰', time: '09:00-12:00', icon: '🌅' },
    { name: 'afternoon', startMin: 840, endMin: 1080, label: '晚高峰', time: '14:00-18:00', icon: '☀️' }
];
var PEAK_SOON_THRESHOLD = 60; // minutes — warn when peak starts within 1 hour

// ── Toast ────────────────────────────────
var toastTimer;
function showToast(msg) {
    clearTimeout(toastTimer);
    $toast.textContent = msg;
    $toast.classList.add('show');
    toastTimer = setTimeout(function() { $toast.classList.remove('show'); }, 2200);
}

// ── History Persistence ──────────────────
function loadHistory() {
    try {
        var raw = localStorage.getItem(HISTORY_KEY);
        var arr = raw ? JSON.parse(raw) : [];
        // Validate entries
        if (!Array.isArray(arr)) return [];
        return arr.filter(function(h) { return typeof h.t === 'number' && typeof h.v === 'number'; });
    } catch(e) { return []; }
}

function saveHistory(arr) {
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(arr)); } catch(e) {}
}

// ── Currency Selection ───────────────────
function selectBalanceInfo(balanceData) {
    var infos = balanceData.balance_infos;
    if (!infos || infos.length === 0) return null;
    for (var i = 0; i < infos.length; i++) {
        if (infos[i].currency === 'CNY') return infos[i];
    }
    return infos[0];
}

// ── Beijing Time Helpers ─────────────────
function getBeijingTime(date) {
    var utc = date.getTime() + date.getTimezoneOffset() * 60000;
    return new Date(utc + 8 * 3600000);
}

// ── Peak Detection ───────────────────────
function isPeakHour(date) {
    var bj = getBeijingTime(date || new Date());
    var mins = bj.getHours() * 60 + bj.getMinutes();
    for (var i = 0; i < PEAK_BLOCKS.length; i++) {
        if (mins >= PEAK_BLOCKS[i].startMin && mins < PEAK_BLOCKS[i].endMin) return true;
    }
    return false;
}

function isTimestampPeak(ts) {
    return isPeakHour(new Date(ts));
}

// Returns which peak block a given time falls in, or null
function getActivePeakBlock(date) {
    var bj = getBeijingTime(date || new Date());
    var mins = bj.getHours() * 60 + bj.getMinutes();
    for (var i = 0; i < PEAK_BLOCKS.length; i++) {
        if (mins >= PEAK_BLOCKS[i].startMin && mins < PEAK_BLOCKS[i].endMin) return PEAK_BLOCKS[i];
    }
    return null;
}

function getPeakInfo() {
    var bj = getBeijingTime(new Date());
    var mins = bj.getHours() * 60 + bj.getMinutes();

    // Check if currently in a peak block
    var activeBlock = getActivePeakBlock(new Date());

    if (activeBlock) {
        // Currently in peak
        var remaining = activeBlock.endMin - mins;
        return {
            isPeak: true, status: 'on', segment: activeBlock.name,
            title: '🔥 ' + activeBlock.label + '进行中 (' + activeBlock.time + ')',
            sub: 'DeepSeek API 费率翻倍（2×），请注意控制用量',
            nextLabel: activeBlock.label + '距结束',
            countdown: remaining,
            blockTotal: activeBlock.endMin - activeBlock.startMin,
            blockElapsed: activeBlock.endMin - remaining - activeBlock.startMin
        };
    }

    // Not in peak — find the next peak start
    var nextBlock = null;
    var untilStart = Infinity;

    for (var i = 0; i < PEAK_BLOCKS.length; i++) {
        if (mins < PEAK_BLOCKS[i].startMin) {
            // This block hasn't started yet today
            untilStart = PEAK_BLOCKS[i].startMin - mins;
            nextBlock = PEAK_BLOCKS[i];
            break;
        }
    }

    if (!nextBlock) {
        // All peaks passed today — next is tomorrow's first block
        nextBlock = PEAK_BLOCKS[0];
        untilStart = (1440 - mins) + nextBlock.startMin;
    }

    var isSoon = untilStart <= PEAK_SOON_THRESHOLD;

    if (isSoon) {
        return {
            isPeak: false, status: 'soon', segment: null,
            title: '⚠️ ' + nextBlock.label + '即将开始 (' + nextBlock.time + ')',
            sub: '距' + nextBlock.label + '还有 ' + formatCountdown(untilStart) + '，费率即将翻倍',
            nextLabel: nextBlock.label + '距开始',
            countdown: untilStart,
            blockTotal: nextBlock.endMin - nextBlock.startMin,
            blockElapsed: 0
        };
    }

    // Off-peak (far from next peak)
    var dayLabel = nextBlock === PEAK_BLOCKS[0] && mins > PEAK_BLOCKS[PEAK_BLOCKS.length - 1].endMin ? '明日' : '';
    return {
        isPeak: false, status: 'off', segment: null,
        title: '🟢 当前为非高峰时段',
        sub: (mins > PEAK_BLOCKS[PEAK_BLOCKS.length - 1].endMin
            ? '今日高峰已结束 · 明日早高峰 09:00-12:00'
            : '高峰时段 09:00-12:00 / 14:00-18:00（费率 2×）'),
        nextLabel: '距' + dayLabel + nextBlock.label,
        countdown: untilStart,
        blockTotal: 0,
        blockElapsed: 0
    };
}

function formatCountdown(totalMinutes) {
    if (totalMinutes <= 0) return '0分钟';
    var h = Math.floor(totalMinutes / 60);
    var m = totalMinutes % 60;
    if (h > 0) return h + '小时' + (m > 0 ? m + '分钟' : '');
    return m + '分钟';
}

// ── Record Checkpoint ────────────────────
function recordCheckpoint(balanceData) {
    var info = selectBalanceInfo(balanceData);
    if (!info) return;

    var total = parseFloat(info.total_balance);
    if (isNaN(total)) return;

    var now = Date.now();
    var intervalMs = CHECKPOINT_MINUTES * 60 * 1000;

    // ── Cross-tab guard ────────────────────
    // localStorage is per-origin; writes from any tab are visible immediately.
    // Strategy: check a separate high-frequency timestamp key BEFORE reading history,
    // then update it AFTER writing — if two tabs race, the second one will see the
    // first's timestamp and bail out.
    var lastCkptRaw = localStorage.getItem(LAST_CKPT_KEY);
    var lastCkptTs = lastCkptRaw ? parseInt(lastCkptRaw, 10) : 0;
    if (!isNaN(lastCkptTs) && now - lastCkptTs < intervalMs) return;

    // Load history AFTER the cross-tab gate to minimize the race window
    var history = loadHistory();

    // Gate: prevent duplicate within 5 min (same-tab fast path)
    if (history.length > 0) {
        var last = history[history.length - 1];
        if (now - last.t < intervalMs) return;
    }

    // Cross-tab re-check: another tab may have written between our first check
    // and now — re-read the marker to see if it changed
    var recheck = localStorage.getItem(LAST_CKPT_KEY);
    var recheckTs = recheck ? parseInt(recheck, 10) : 0;
    if (!isNaN(recheckTs) && recheckTs !== lastCkptTs && now - recheckTs < intervalMs) return;

    // Write marker BEFORE pushing to claim this time slot
    localStorage.setItem(LAST_CKPT_KEY, String(now));

    history.push({
        t: now,
        v: Math.round(total * 100) / 100,
        g: Math.round((parseFloat(info.granted_balance) || 0) * 100) / 100,
        p: Math.round((parseFloat(info.topped_up_balance) || 0) * 100) / 100
    });

    // Purge old data — use splice instead of while+shift for performance
    var cutoff = now - MAX_HISTORY_DAYS * 24 * 3600 * 1000;
    var purgeIdx = 0;
    while (purgeIdx < history.length && history[purgeIdx].t < cutoff) purgeIdx++;
    if (purgeIdx > 0) history.splice(0, purgeIdx);

    // Trim to max safe size (~30k entries)
    if (history.length > 30000) history.splice(0, history.length - 30000);

    saveHistory(history);
}

// ── Cost Calculation ─────────────────────
function calcCosts(history) {
    var now = new Date();
    var thisHourStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours()).getTime();
    var todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
    var thisMonthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();

    var costHour = 0, costDay = 0, costMonth = 0;
    var peakHour = 0, peakDay = 0, peakMonth = 0;
    var lastTopped = null;
    var lastTs = null;
    var MAX_GAP_MS = 30 * 60 * 1000; // 30 min — gaps larger than this get interpolated

    function addCost(amount, ts, weight) {
        // weight: 0-1 fraction of the total drop to attribute to this time point
        var w = weight || 1;
        var amt = Math.round(amount * w * 100) / 100;
        if (amt <= 0.001) return;
        var isPeak = isTimestampPeak(ts);
        if (ts >= thisHourStart) {
            costHour = Math.round((costHour + amt) * 100) / 100;
            if (isPeak) peakHour = Math.round((peakHour + amt) * 100) / 100;
        }
        if (ts >= todayStart) {
            costDay = Math.round((costDay + amt) * 100) / 100;
            if (isPeak) peakDay = Math.round((peakDay + amt) * 100) / 100;
        }
        if (ts >= thisMonthStart) {
            costMonth = Math.round((costMonth + amt) * 100) / 100;
            if (isPeak) peakMonth = Math.round((peakMonth + amt) * 100) / 100;
        }
    }

    for (var i = 0; i < history.length; i++) {
        var h = history[i];

        if (lastTopped !== null) {
            var toppedDrop = lastTopped - h.p;

            // Only count topped-up balance decreases as real spending
            if (toppedDrop > 0.001) {
                toppedDrop = Math.round(toppedDrop * 100) / 100;
                var gapMs = lastTs ? (h.t - lastTs) : 0;

                if (gapMs > MAX_GAP_MS && lastTs) {
                    // ── Interpolation for large gaps (e.g. device sleep) ──
                    // Distribute the cost linearly across the gap at 30-min intervals,
                    // each slice weighted by its fraction of the total gap duration.
                    var slices = Math.round(gapMs / (30 * 60 * 1000));
                    if (slices < 2) slices = 2;
                    if (slices > 48) slices = 48; // cap at 24 hours worth
                    var sliceWeight = 1 / slices;

                    for (var s = 1; s <= slices; s++) {
                        var sliceTs = lastTs + Math.round(gapMs * (s / slices));
                        addCost(toppedDrop, sliceTs, sliceWeight);
                    }
                } else {
                    // Normal case: gap ≤ 30min — attribute to current timestamp
                    addCost(toppedDrop, h.t, 1);
                }
            }

            // Detect top-up: topped-up balance increased → reset baseline
            if (h.p > lastTopped + 0.001) {
                lastTopped = h.p;
                lastTs = h.t;
                continue;
            }
        }

        lastTopped = h.p;
        lastTs = h.t;
    }

    return {
        hour: costHour, day: costDay, month: costMonth,
        peakHour: peakHour, peakDay: peakDay, peakMonth: peakMonth
    };
}

// ── Chart Builders ───────────────────────
function pad(n) { return String(n).padStart(2, '0'); }

function getTrendData(history, range) {
    var now = Date.now();
    var cutoffs = { '24h': now - 86400000, '7d': now - 604800000, '30d': now - 2592000000 };
    var cutoff = cutoffs[range] || cutoffs['24h'];
    var labels = [], values = [];
    for (var i = 0; i < history.length; i++) {
        var h = history[i];
        if (h.t < cutoff) continue;
        var d = new Date(h.t);
        if (range === '24h') labels.push(pad(d.getHours()) + ':' + pad(d.getMinutes()));
        else labels.push((d.getMonth() + 1) + '/' + d.getDate());
        values.push(h.v);
    }
    return { labels: labels, values: values };
}

function getBarData(history, groupBy) {
    var groups = {};
    var lastTopped = null;
    var lastTs = null;
    var MAX_GAP_MS = 30 * 60 * 1000;

    for (var i = 0; i < history.length; i++) {
        var h = history[i];
        if (lastTopped !== null) {
            var drop = lastTopped - h.p;
            if (drop > 0.001) {
                drop = Math.round(drop * 100) / 100;
                var gapMs = lastTs ? (h.t - lastTs) : 0;

                if (gapMs > MAX_GAP_MS && lastTs) {
                    // Interpolate large gaps
                    var slices = Math.round(gapMs / (30 * 60 * 1000));
                    if (slices < 2) slices = 2;
                    if (slices > 48) slices = 48;
                    var sliceWeight = drop / slices;

                    for (var s = 1; s <= slices; s++) {
                        var sliceTs = lastTs + Math.round(gapMs * (s / slices));
                        var sd = new Date(sliceTs);
                        var skey;
                        if (groupBy === 'hour') skey = sd.getFullYear() + '-' + pad(sd.getMonth()+1) + '-' + pad(sd.getDate()) + ' ' + pad(sd.getHours());
                        else if (groupBy === 'day') skey = sd.getFullYear() + '-' + pad(sd.getMonth()+1) + '-' + pad(sd.getDate());
                        else skey = sd.getFullYear() + '-' + pad(sd.getMonth()+1);
                        groups[skey] = Math.round(((groups[skey] || 0) + sliceWeight) * 100) / 100;
                    }
                } else {
                    // Normal case
                    var key, d = new Date(h.t);
                    if (groupBy === 'hour') key = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours());
                    else if (groupBy === 'day') key = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
                    else key = d.getFullYear() + '-' + pad(d.getMonth()+1);
                    groups[key] = Math.round(((groups[key] || 0) + drop) * 100) / 100;
                }
            }
        }
        if (lastTopped === null || h.p <= lastTopped) { lastTopped = h.p; lastTs = h.t; }
        else { lastTopped = h.p; lastTs = h.t; }
    }

    var keys = Object.keys(groups).sort();
    var labels, values;

    if (groupBy === 'hour') {
        keys = keys.slice(-24);
        labels = keys.map(function(k) { var parts = k.split(' '); return parts[1] ? parts[1] + ':00' : k; });
    } else if (groupBy === 'day') {
        keys = keys.slice(-14);
        labels = keys.map(function(k) { var parts = k.split('-'); return parts[1] + '/' + parts[2]; });
    } else {
        keys = keys.slice(-12);
        labels = keys.map(function(k) { var parts = k.split('-'); return parts[0].slice(2) + '/' + parts[1]; });
    }
    values = keys.map(function(k) { return groups[k]; });

    return { labels: labels, values: values };
}

// ── API Fetch ────────────────────────────
function fetchBalance() {
    if (!apiKey) return Promise.reject(new Error('no_key'));
    var headers = { 'Accept': 'application/json', 'Authorization': 'Bearer ' + apiKey };

    function tryFetch(idx) {
        return fetch(API_URLS[idx], { headers: headers }).then(function(resp) {
            if (!resp.ok) {
                return resp.text().then(function(body) {
                    var msg = '';
                    try { var j = JSON.parse(body); msg = j.error ? j.error.message || '' : ''; } catch(e) {}
                    var err = new Error(msg || 'HTTP ' + resp.status);
                    err.status = resp.status;
                    throw err;
                });
            }
            return resp.json();
        }).catch(function(e) {
            var isNetErr = e.name === 'TypeError' || (e.message || '').indexOf('Failed to fetch') >= 0;
            if (isNetErr && idx < API_URLS.length - 1) return tryFetch(idx + 1);
            throw e;
        });
    }
    return tryFetch(0);
}

        '<div class="balance-card">' +
        '<div class="balance-label">总余额</div>' +
        '<div class="balance-row"><div class="balance-amount" id="animTotal">' + fmt(total) + '</div><span class="balance-currency">' + currency + '</span></div>' +
        '<div class="balance-details">' +
        '<div class="balance-detail-item"><div class="detail-icon">🎁</div><div class="detail-label">赠送余额</div><div class="detail-value">' + fmt(granted) + '</div></div>' +
        '<div class="balance-detail-item"><div class="detail-icon">💳</div><div class="detail-label">充值余额</div><div class="detail-value">' + fmt(toppedUp) + '</div></div>' +
        '</div></div>' +
        renderPeakBannerHTML() +
        '<div class="status-row">' +
        '<div class="status-card"><div class="status-icon">' + (d.is_available ? '✅' : '🚫') + '</div><div class="status-value ' + (d.is_available ? 'status-available' : 'status-unavailable') + '">' + (d.is_available ? '可用' : '不可用') + '</div><div class="status-label">API 状态</div></div>' +
        '<div class="status-card" id="cardRefresh"><div class="status-icon">🔄</div><div class="status-value" id="countdownDisplay">' + countdown + 's</div><div class="status-label" id="lastUpdatedLabel">点击刷新</div></div>' +
        '</div>' +
        '<div class="timer-section"><div class="timer-ring"><svg width="30" height="30" viewBox="0 0 30 30"><circle class="bg" cx="15" cy="15" r="12.5"/><circle class="progress" cx="15" cy="15" r="12.5" stroke-dasharray="' + circ.toFixed(2) + '" stroke-dashoffset="' + offset.toFixed(2) + '"/></svg></div><span class="timer-text">' + countdown + 's 后自动刷新</span></div>' +
        renderStatsHTML(history);

    document.getElementById('cardRefresh').addEventListener('click', refresh);
    updateTimestamp();
    if (total != null) animateTotal(parseFloat(total));

    setTimeout(function() { renderCharts(history); }, 150);

    // Time toggle events
    var toggles = document.querySelectorAll('.time-toggle');
    for (var i = 0; i < toggles.length; i++) {
        toggles[i].addEventListener('click', function() {
            trendRange = this.getAttribute('data-range');
            var history2 = loadHistory();
            var all = document.querySelectorAll('.time-toggle');
            for (var j = 0; j < all.length; j++) all[j].classList.remove('active');
            this.classList.add('active');
            destroyCharts();
            renderCharts(history2);
        });
    }
}

function updateTimestamp() {
    var el = document.getElementById('lastUpdatedLabel');
    if (el) {
        var now = new Date();
        el.textContent = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds()) + ' 更新';
    }
}

function animateTotal(target) {
    if (isNaN(target)) return;
    var el = document.getElementById('animTotal');
    if (!el) return;
    var duration = 500, start = 0, startTime = performance.now();
    function step(now) {
        var elapsed = now - startTime;
        var progress = Math.min(elapsed / duration, 1);
        var eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = fmt(start + (target - start) * eased);
        if (progress < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
}

function updateTimerDisplay() {
    var el = document.getElementById('countdownDisplay');
    if (el) el.textContent = countdown + 's';
    var ring = document.querySelector('.timer-ring .progress');
    var timerText = document.querySelector('.timer-text');
    if (ring) {
        var pct = Math.max(0, (countdown / REFRESH_INTERVAL) * 100);
        var circ = 2 * Math.PI * 12.5;
        ring.setAttribute('stroke-dashoffset', (circ * (1 - pct / 100)).toFixed(2));
    }
    if (timerText) timerText.textContent = Math.max(0, countdown) + 's 后自动刷新';
}

// ── Timer ────────────────────────────────
function refresh() {
    if (loading) return;
    if (!apiKey) { renderNoKey(); return; }
    loading = true;
    countdown = REFRESH_INTERVAL;
    renderLoading();

    fetchBalance().then(function(d) {
        data = d;
        renderData(d);
        updateTimestamp();
    }).catch(function(e) {
        if (e.message === 'no_key') { renderNoKey(); return; }
        data = null;
        destroyCharts();
        renderError(e.message, e.status);
    }).finally(function() {
        loading = false;
        resetTimer();
    });
}

function resetTimer() {
    clearInterval(timerInterval);
    countdown = REFRESH_INTERVAL;
    timerInterval = setInterval(function() {
        countdown--;
        // Guard against negative countdown from sleep/resume
        if (countdown < -60) {
            countdown = REFRESH_INTERVAL;
            refresh();
            return;
        }
        updateTimerDisplay();
        if (countdown <= 0) refresh();
    }, 1000);
}

// ── Settings ─────────────────────────────
function saveApiKey(key) {
    key = key.trim();
    apiKey = key;
    localStorage.setItem(STORAGE_KEY, key);
    $apiKeyInput.value = '';
    $overlay.classList.remove('open');
    showToast('✅ API Key 已保存');
    refresh();
}

function clearApiKey() {
    apiKey = '';
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(HISTORY_KEY);
    data = null;
    destroyCharts();
    $overlay.classList.remove('open');
    showToast('🗑 API Key 已清除');
    renderNoKey();
}

function fmt(val) {
    if (val === undefined || val === null) return '--';
    var n = parseFloat(val);
    if (isNaN(n)) return String(val);
    return n.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function esc(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ── Event Bindings ───────────────────────
$btnRefresh.addEventListener('click', refresh);
document.getElementById('btnSettings').addEventListener('click', function() { $overlay.classList.add('open'); });
document.getElementById('btnSaveKey').addEventListener('click', function() {
    var key = $apiKeyInput.value.trim();
    if (!key) { showToast('⚠️ 请输入 API Key'); return; }
    if (key.indexOf('sk-') !== 0) { showToast('⚠️ API Key 应以 sk- 开头'); return; }
    saveApiKey(key);
});
document.getElementById('btnClearKey').addEventListener('click', function() {
    if (confirm('确定要清除 API Key 吗？')) clearApiKey();
});
$overlay.addEventListener('click', function(e) { if (e.target === $overlay) $overlay.classList.remove('open'); });
$apiKeyInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        var key = $apiKeyInput.value.trim();
        if (key && key.indexOf('sk-') === 0) saveApiKey(key);
        else showToast('⚠️ API Key 应以 sk- 开头');
    }
});

// ── PWA Service Worker ───────────────────
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(){});
}

// ── Init ─────────────────────────────────
if (apiKey) { refresh(); } else { renderNoKey(); }
})();
</script>
</body>
</html>
